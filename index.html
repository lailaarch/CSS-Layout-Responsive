<!DOCTYPE html>
<html>
<head>
<title>CSS & Layout Responsive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
}


.header {
  background: rgb(211, 206, 145);
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  display: flex;
}

.sidebar {
  width: 30%;
  background: lightgray;
  padding: 10px;
}

.content {
  width: 70%;
  padding: 10px;
}

.footer {
  background: rgb(211, 206, 145);
  color: white;
  text-align: center;
  padding: 10px;
}

@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }
  .sidebar, .content {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header">Header</div>

<div class="container">
  <div class="sidebar">Sidebar</div>
  <div class="content">Content Utama</div>
</div>

<div class="footer">Footer</div>

</body>
</html>
